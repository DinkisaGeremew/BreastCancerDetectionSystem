<!DOCTYPE html>
<html lang="{{ lang }}">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{ texts.get('page_title', 'Create Admin User') }}</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
    <div class="container mt-5">
        <div class="row justify-content-center">
            <div class="col-md-6">
                <div class="card">
                    <div class="card-header">
                        <h4 class="mb-0">{{ texts.get('create_admin', 'Create Admin User') }}</h4>
                    </div>
                    <div class="card-body">
                        <form method="POST">
                            <div class="mb-3">
                                <label for="username" class="form-label">{{ texts.get('username', 'Username') }}</label>
                                <input type="text" class="form-control" id="username" name="username" required>
                            </div>
                            
                            <div class="mb-3">
                                <label for="phone" class="form-label">{{ texts.get('phone', 'Phone') }}</label>
                                <div class="input-group">
                                    <span class="input-group-text">+251</span>
                                    <input type="text" class="form-control" id="phone" name="phone" 
                                           placeholder="9xxxxxxxx or 7xxxxxxxx" pattern="[97]\d{8}" required>
                                </div>
                                <div class="form-text">Enter 9 digits without +251 prefix</div>
                            </div>
                            
                            <div class="mb-3">
                                <label for="password" class="form-label">{{ texts.get('password', 'Password') }}</label>
                                <input type="password" class="form-control" id="password" name="password" required>
                            </div>
                            
                            <div class="mb-3">
                                <label for="confirm_password" class="form-label">{{ texts.get('confirm_password', 'Confirm Password') }}</label>
                                <input type="password" class="form-control" id="confirm_password" name="confirm_password" required>
                            </div>
                            
                            <div class="d-grid gap-2">
                                <button type="submit" class="btn btn-primary">{{ texts.get('create_admin_button', 'Create Admin') }}</button>
                                <a href="{{ url_for('dashboard_admin') }}" class="btn btn-secondary">{{ texts.get('cancel', 'Cancel') }}</a>
                            </div>
                        </form>
                    </div>
                </div>
            </div>
        </div>
    </div>
</body>
</html>
