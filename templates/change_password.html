<!DOCTYPE html>
<html lang="{{ session.get('lang', 'en') }}">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>
        {% if session.get('lang') == 'or' %}
            Jecha Darbii Jijjiiri
        {% else %}
            Change Password
        {% endif %}
    </title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/change_password.css') }}">
</head>
<body>
    <div class="container">
        <div class="login-card">
            <h1>
                {% if session.get('lang') == 'or' %}
                    Jecha Darbii Jijjiiri
                {% else %}
                    Change Password
                {% endif %}
            </h1>
            <form method="POST">
                <input type="password" name="current_password" 
                    placeholder="{% if session.get('lang') == 'or' %}Jecha Darbii Amma{% else %}Current Password{% endif %}" 
                    required>
                <input type="password" name="new_password" 
                    placeholder="{% if session.get('lang') == 'or' %}Jecha Darbii Haaraa{% else %}New Password{% endif %}" 
                    required>
                <input type="password" name="confirm_password" 
                    placeholder="{% if session.get('lang') == 'or' %}Jecha Darbii Haaraa Mirkanneessi{% else %}Confirm New Password{% endif %}" 
                    required>
                <button type="submit">
                    {% if session.get('lang') == 'or' %}
                        Jecha Darbii Haaromsii
                    {% else %}
                        Update Password
                    {% endif %}
                </button>
            </form>
            <div class="links">
                <a href="{{ url_for('home') }}">
                    {% if session.get('lang') == 'or' %}
                        Gara Fuula Duraa Deebi'i
                    {% else %}
                        Back to Home
                    {% endif %}
                </a>
            </div>
        </div>
    </div>
</body>
</html>
