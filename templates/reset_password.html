<!DOCTYPE html>
<html lang="{{ session.get('lang', 'en') }}">
<head>
    <meta charset="UTF-8" />
    <title>
        {% if session.get('lang') == 'or' %}
            Jecha Darbii Haaraa
        {% else %}
            Reset Password
        {% endif %}
    </title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background: linear-gradient(135deg, #0078D4 0%, #0063B1 100%);
            color: #fff;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            position: relative;
            overflow: hidden;
        }
        
        body::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: url("data:image/svg+xml,%3Csvg width='60' height='60' viewBox='0 0 60 60' xmlns='http://www.w3.org/2000/svg'%3E%3Cg fill='none' fill-rule='evenodd'%3E%3Cg fill='%23ffffff' fill-opacity='0.08'%3E%3Cpath d='M36 34v-4h-2v4h-4v2h4v4h2v-4h4v-2h-4zm0-30V0h-2v4h-4v2h4v4h2V6h4V4h-4zM6 34v-4H4v4H0v2h4v4h2v-4h4v-2H6zM6 4V0H4v4H0v2h4v4h2V6h4V4H6z'/%3E%3C/g%3E%3C/g%3E%3C/svg%3E");
            opacity: 0.5;
            z-index: 0;
        }
        .reset-container {
            background: rgba(255, 255, 255, 0.98);
            padding: 40px 50px;
            border-radius: 20px;
            box-shadow: 0 10px 30px rgba(0, 120, 212, 0.3);
            text-align: center;
            width: 350px;
            position: relative;
            z-index: 1;
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.5);
        }
        h2 {
            margin-bottom: 25px;
            font-weight: 900;
            font-size: 2rem;
            background: linear-gradient(135deg, #0078D4 0%, #0063B1 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            letter-spacing: 2px;
        }
        input {
            width: 100%;
            padding: 12px 15px;
            margin: 12px 0 20px 0;
            border-radius: 8px;
            border: 2px solid #E1E1E1;
            font-size: 1rem;
            outline: none;
            background: #F9F9F9;
            color: #333;
            transition: all 0.3s ease;
        }
        input::placeholder {
            color: #B0B0B0;
        }
        input:focus {
            background: white;
            border-color: #0078D4;
            box-shadow: 0 0 0 3px rgba(0, 120, 212, 0.1);
            color: #333;
        }
        button {
            padding: 14px 0;
            width: 100%;
            border-radius: 50px;
            background: linear-gradient(135deg, #0078D4 0%, #0063B1 100%);
            border: none;
            color: #fff;
            font-weight: 700;
            font-size: 1.2rem;
            cursor: pointer;
            box-shadow: 0 4px 15px rgba(0, 120, 212, 0.3);
            transition: all 0.3s ease;
        }
        button:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(0, 120, 212, 0.4);
        }
        .flash-message {
            margin-bottom: 15px;
            font-weight: 600;
            color: #0078D4;
        }
        label {
            display: block;
            margin-bottom: 8px;
            font-weight: 600;
            color: #0078D4;
            text-align: left;
        }
    </style>
</head>
<body>
    <div class="reset-container">
        <h2>
            {% if session.get('lang') == 'or' %}
                Jecha Darbii Haaraa
            {% else %}
                Reset Password
            {% endif %}
        </h2>
        {% with messages = get_flashed_messages(with_categories=true) %}
            {% if messages %}
                {% for category, message in messages %}
                    <div class="flash-message {{ category }}">{{ message }}</div>
                {% endfor %}
            {% endif %}
        {% endwith %}
        <form method="POST" action="{{ url_for('reset_password') }}">
            <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
            <input type="password" name="password" 
                placeholder="{% if session.get('lang') == 'or' %}Jecha Darbii Haaraa{% else %}New Password{% endif %}" 
                required />
            <input type="password" name="confirm_password" 
                placeholder="{% if session.get('lang') == 'or' %}Jecha Darbii Haaraa Mirkanneessi{% else %}Confirm New Password{% endif %}" 
                required />
            <button type="submit">
                {% if session.get('lang') == 'or' %}
                    Jecha Darbii Haaromsii
                {% else %}
                    Reset Password
                {% endif %}
            </button>
        </form>
    </div>
</body>
</html>
